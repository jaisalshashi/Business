<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#000;color:#fff;}

.bg{
position:fixed;inset:0;
background:url('bg.jpg') center/cover no-repeat;
z-index:-2;
}

.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:-1;
}

header{
display:flex;justify-content:space-between;
padding:18px;
font-size:20px;font-weight:600;
}

.cart{
cursor:pointer;
background:rgba(255,255,255,0.1);
padding:6px 12px;border-radius:20px;
}

.post{
margin:20px;padding:15px;
background:rgba(255,255,255,0.08);
border-radius:25px;
backdrop-filter:blur(20px);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.item{
position:relative;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
background:#000;
padding:10px;
border-radius:15px;
}

.item img{
max-width:100%;
max-height:200px;
width:auto;
height:auto;
object-fit:contain;
border-radius:15px;
}

.price{
position:absolute;bottom:8px;left:8px;
background:#25D366;
padding:5px 10px;border-radius:10px;
}

/* CART */
.cartBox{
position:fixed;right:-100%;top:0;
width:320px;height:100%;
background:#111;padding:20px;
transition:0.4s;
}
.cartBox.active{right:0;}

.remove{color:red;cursor:pointer;margin-left:6px;}

/* FORM */
.formPage{
position:fixed;inset:0;
display:none;justify-content:center;align-items:center;
background:rgba(0,0,0,0.8);
}

.formBox{
background:#111;padding:20px;border-radius:15px;
width:90%;max-width:400px;
}

.formBox input{
width:100%;padding:10px;margin:6px 0;
border:none;border-radius:8px;
}

.btn{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:10px;
cursor:pointer;
}

.green{background:#25D366;color:#fff;}
.red{background:red;color:#fff;}
</style>
</head>

let cart=[];

function render(){
let html=`<div class="post"><div class="grid">`;

products.forEach(p=>{
html+=`
<div class="item" onclick="addToCart('${p.name}',${p.price},'${p.img}','${p.code}')">
<img src="${p.img}">
<div class="price">₹${p.price}</div>
</div>`;
});

html+=`</div></div>`;
document.getElementById("container").innerHTML=html;
}

function addToCart(name,price,img,code){
let item=cart.find(i=>i.code===code);
if(item)item.qty++;
else cart.push({name,price,img,code,qty:1});
updateCart();
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function updateCart(){
let html="",total=0,count=0;

cart.forEach((item,i)=>{
total+=item.price*item.qty;
count+=item.qty;

html+=`
🆔 ${item.code} - ${item.name} x${item.qty} - ₹${item.price*item.qty}
<span class="remove" onclick="removeItem(${i})">❌</span><br>
`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: ₹"+total;
document.getElementById("count").innerText=count;
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

function openForm(){
if(cart.length===0)return alert("Cart empty");
document.getElementById("formPage").style.display="flex";
}

function closeForm(){
document.getElementById("formPage").style.display="none";
}

function placeOrder(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let address=document.getElementById("address").value.trim();

if(!name||!phone||!address){
alert("Fill all details");
return;
}

let orderID="ORD"+Date.now();
let total=0;

let msg=`🧾 Order ID: ${orderID}\n\n`;

cart.forEach(item=>{
total+=item.price*item.qty;
msg+=`🆔 ${item.code}\n${item.name} x${item.qty} - ₹${item.price*item.qty}\n`;
});

msg+=`Total: ₹${total}\n\n👤Name: ${name}\n📞 Number: ${phone}\n🏠 Address: ${address}`;

/* FIREBASE */
db.collection("orders").add({
orderID,name,phone,address,cart,total,time:Date.now()
});

/* WHATSAPP */
window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`);

cart=[];
updateCart();
closeForm();

alert("Order Sent 🔥");
}
